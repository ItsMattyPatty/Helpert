<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpert | Study Sets and Practice Tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="navbar-brand" onclick="showPage('home')">Helpert</div>
            <div class="navbar-links">
                <button onclick="showPage('home')">Home</button>
                <button onclick="showPage('flashcards')">Flashcards</button>
                <button onclick="showPage('mcqs')">Practice Tests</button>
            </div>
        </div>
    </nav>

    <div id="home" class="page">
        <div class="welcome-section">
            <h1>Master your classes</h1>
            <p>Create study sets and test your knowledge with precision.</p>
        </div>
        <div class="dashboard-grid">
            <div class="dashboard-card" onclick="showPage('flashcards')">
                <span class="card-icon">🗂️</span>
                <div class="card-info">
                    <h2 id="flashcard-count">0</h2>
                    <p>Flashcard Sets</p>
                </div>
            </div>
            <div class="dashboard-card" onclick="showPage('mcqs')">
                <span class="card-icon">📝</span>
                <div class="card-info">
                    <h2 id="mcq-count">0</h2>
                    <p>Practice Tests</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Flashcards Page -->
    <div id="flashcards" class="page" style="display:none;">
        <div class="section-header">
            <h2>Flashcard Sets</h2>
            <button class="btn-primary" onclick="showCreateForm('flashcard')">Create new set</button>
        </div>
        <div id="flashcard-list" class="sets-list"></div>
    </div>

    <!-- Study Flashcard View -->
    <div id="study-flashcards" class="page" style="display:none;">
        <div class="study-header">
            <button class="btn-back" onclick="showPage('flashcards')">← Back</button>
            <h2 id="study-fc-title">Set Title</h2>
        </div>
        <div class="study-viewport">
            <div class="flashcard-container">
                <div class="flashcard" onclick="flipCard(this)">
                    <div class="card-inner">
                        <div class="card-front"><div class="card-text" id="fc-content-front">Term</div></div>
                        <div class="card-back"><div class="card-text" id="fc-content-back">Definition</div></div>
                    </div>
                </div>
                <div class="study-nav">
                    <button class="nav-btn" onclick="prevCard()">←</button>
                    <div class="nav-status"><span id="card-index">1 / 1</span></div>
                    <button class="nav-btn" onclick="nextCard()">→</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MCQs Page -->
    <div id="mcqs" class="page" style="display:none;">
        <div class="section-header">
            <h2>Practice Tests</h2>
            <button class="btn-primary" onclick="showCreateForm('mcq')">Create new test</button>
        </div>
        <div id="mcq-list" class="sets-list"></div>
    </div>

    <!-- Take MCQ Test View -->
    <div id="take-mcq" class="page" style="display:none;">
        <div class="study-header">
            <button class="btn-back" onclick="showPage('mcqs')">← Back</button>
            <h2 id="take-mcq-title">Test Title</h2>
        </div>
        <div class="test-viewport" id="test-main-view">
            <div class="test-card">
                <div class="test-progress" id="q-index-display">Question 1 of 1</div>
                <div class="question-text" id="q-text">Question content...</div>
                <div class="options-grid" id="options-container">
                    <!-- Options injected by JS -->
                </div>
                <div id="test-feedback" class="test-feedback"></div>
            </div>
            <div class="test-footer">
                <button class="btn-secondary" onclick="restartTest()">Restart</button>
                <div class="footer-nav">
                    <button class="nav-btn" onclick="prevQuestion()">←</button>
                    <button class="nav-btn" onclick="nextQuestion()">→</button>
                </div>
            </div>
        </div>
        <div id="test-score-view" class="results-view" style="display:none;">
            <h2>Test Results</h2>
            <div class="score-circle">
                <div id="final-score">0 / 0</div>
            </div>
            <div class="results-actions">
                <button class="btn-primary" onclick="restartTest()">Try Again</button>
                <button class="btn-secondary" onclick="showPage('mcqs')">Finish</button>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal-container" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Create New Set</h3>
                <button class="btn-close" onclick="closeModals()">&times;</button>
            </div>
            <div id="modal-error" class="alert-danger" style="display:none;"></div>
            <div class="form-body">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="set-title" placeholder="Enter a title">
                </div>
                <div class="input-group">
                    <label>Description (Optional)</label>
                    <input type="text" id="set-topic" placeholder="Add a description...">
                </div>
                <hr>
                <div id="items-container" class="items-list"></div>
                <button class="btn-add" id="btn-add-item">+ Add item</button>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btn-save-set">Create</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
